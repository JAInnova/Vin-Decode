<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>VIN Scanner Button</title>

<script src="//js.jotform.com/JotFormCustomWidget.min.js"></script>
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #ff5b00;
    --orange-dark: #c44400;
    --ink: #1a1d24;
    --ink-soft: #4a5160;
    --paper: #f5f6f8;
    --paper-dark: #e8eaef;
    --line: #d6d9e0;
    --green: #16a34a;
    --green-bg: #ecfdf5;
    --red: #dc2626;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
    color: var(--ink);
    background: transparent;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .widget { width: 100%; }

  /* Collapsed view = button + optional captured-value chip */
  .collapsed {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .scan-btn {
    flex: 0 0 auto;
    padding: 12px 18px;
    background: var(--orange);
    color: #fff;
    border: 0;
    border-radius: 8px;
    font: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s, transform 0.05s;
    -webkit-tap-highlight-color: transparent;
  }
  .scan-btn:hover { background: var(--orange-dark); }
  .scan-btn:active { transform: translateY(1px); }
  .scan-btn svg { width: 18px; height: 18px; }

  .chip {
    flex: 1 1 auto;
    min-width: 0;
    padding: 8px 12px;
    background: var(--green-bg);
    border-radius: 8px;
    border-left: 3px solid var(--green);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.5px;
    word-break: break-all;
    display: none;
  }
  .chip.visible { display: block; }
  .chip.invalid {
    background: #fef2f2;
    border-left-color: var(--red);
    color: var(--red);
  }
  .chip-label {
    display: block;
    font-family: -apple-system, sans-serif;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--ink-soft);
    font-weight: 600;
    margin-bottom: 2px;
  }

  /* Expanded scanner view */
  .scanner-view {
    display: none;
  }
  .scanner-view.active { display: block; }

  .scanner {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 3;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
  }
  .scanner video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .reticle { position: absolute; inset: 0; pointer-events: none; }
  .reticle::before {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 86%; height: 28%;
    border: 2px solid var(--orange);
    border-radius: 4px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
  }
  .reticle-hint {
    position: absolute;
    bottom: 10px; left: 0; right: 0;
    text-align: center;
    color: #fff;
    font-size: 12px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
  }
  .scan-line {
    position: absolute;
    top: 50%; left: 7%; right: 7%;
    height: 2px;
    background: var(--orange);
    box-shadow: 0 0 8px var(--orange);
    transform: translateY(-50%);
    animation: scan 1.6s ease-in-out infinite;
  }
  @keyframes scan {
    0%, 100% { transform: translateY(-90%); opacity: 0.4; }
    50% { transform: translateY(90%); opacity: 1; }
  }

  .scanner-controls {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .btn-secondary {
    flex: 1;
    padding: 12px 14px;
    background: var(--paper-dark);
    color: var(--ink);
    border: 0;
    border-radius: 8px;
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-secondary:hover { background: var(--line); }
  .btn-icon { flex: 0 0 auto; width: 44px; }
  .btn-icon svg { width: 18px; height: 18px; display: block; margin: 0 auto; }

  .manual-toggle {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 8px;
    background: transparent;
    color: var(--ink-soft);
    border: 0;
    font: inherit;
    font-size: 13px;
    text-decoration: underline;
    cursor: pointer;
  }

  .manual-row {
    display: none;
    margin-top: 10px;
    gap: 8px;
  }
  .manual-row.visible { display: flex; }
  .manual-row input {
    flex: 1;
    padding: 12px 14px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    text-transform: uppercase;
    background: #fff;
  }
  .manual-row input:focus {
    outline: none;
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(255, 91, 0, 0.15);
  }
  .manual-row button {
    padding: 0 16px;
    background: var(--orange);
    color: #fff;
    border: 0;
    border-radius: 8px;
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .status {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 8px;
    min-height: 16px;
  }
  .status.error { color: var(--red); }
  .status.success { color: var(--green); }
</style>
</head>
<body>
<div class="widget">

  <!-- COLLAPSED: just a button, plus optional captured-VIN chip -->
  <div class="collapsed" id="collapsed">
    <button class="scan-btn" id="scanBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Scan VIN
    </button>
    <div class="chip" id="chip">
      <span class="chip-label">Captured</span>
      <span id="chipValue"></span>
    </div>
  </div>

  <button class="manual-toggle" id="manualToggle" type="button">Or enter VIN manually</button>

  <div class="manual-row" id="manualRow">
    <input
      type="text"
      id="manualInput"
      maxlength="17"
      autocapitalize="characters"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
      placeholder="17-character VIN"
    >
    <button id="manualSave" type="button">Save</button>
  </div>

  <!-- EXPANDED: scanner view -->
  <div class="scanner-view" id="scannerView">
    <div class="scanner">
      <video id="video" playsinline muted></video>
      <div class="reticle">
        <div class="scan-line"></div>
        <div class="reticle-hint">Center the VIN barcode in the box</div>
      </div>
    </div>
    <div class="scanner-controls">
      <button class="btn-secondary" id="cancelBtn" type="button">Cancel</button>
      <button class="btn-secondary btn-icon" id="torchBtn" type="button" style="display:none" title="Flashlight">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 2L6 14h6l-2 8 12-12h-6l2-8z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
(function () {
  'use strict';

  var VIN_REGEX = /^[A-HJ-NPR-Z0-9]{17}$/;
  var VIN_EXTRACT = /[A-HJ-NPR-Z0-9]{17}/i;

  var els = {
    collapsed:    document.getElementById('collapsed'),
    scanBtn:      document.getElementById('scanBtn'),
    chip:         document.getElementById('chip'),
    chipValue:    document.getElementById('chipValue'),
    manualToggle: document.getElementById('manualToggle'),
    manualRow:    document.getElementById('manualRow'),
    manualInput:  document.getElementById('manualInput'),
    manualSave:   document.getElementById('manualSave'),
    scannerView:  document.getElementById('scannerView'),
    video:        document.getElementById('video'),
    cancelBtn:    document.getElementById('cancelBtn'),
    torchBtn:     document.getElementById('torchBtn'),
    status:       document.getElementById('status')
  };

  var state = {
    value: '',
    codeReader: null,
    track: null,
    torchOn: false,
    scanning: false
  };

  // ---------- Frame resize for Jotform ----------
  function resizeFrame(height) {
    if (typeof JFCustomWidget !== 'undefined' && JFCustomWidget.requestFrameResize) {
      JFCustomWidget.requestFrameResize({ height: height });
    }
  }

  function resizeToFit() {
    // Measure actual content height and tell Jotform
    var h = document.body.scrollHeight + 4;
    resizeFrame(h);
  }

  // ---------- Helpers ----------
  function setStatus(msg, kind) {
    els.status.textContent = msg || '';
    els.status.className = 'status' + (kind ? ' ' + kind : '');
  }

  function setValue(val, fromScan) {
    val = (val || '').toUpperCase().trim();
    state.value = val;

    if (val) {
      els.chip.classList.add('visible');
      els.chipValue.textContent = val;
      var valid = VIN_REGEX.test(val);
      if (valid) {
        els.chip.classList.remove('invalid');
        setStatus('✓ VIN captured', 'success');
      } else {
        els.chip.classList.add('invalid');
        if (fromScan) {
          setStatus("Scan didn't match a 17-char VIN", 'error');
        } else {
          setStatus('VIN must be 17 chars (no I, O, Q)', 'error');
        }
      }
    } else {
      els.chip.classList.remove('visible');
      setStatus('');
    }

    if (els.manualInput.value !== val) els.manualInput.value = val;
    setTimeout(resizeToFit, 50);
  }

  // ---------- Scanner expand / collapse ----------
  function showScanner() {
    els.collapsed.style.display = 'none';
    els.manualToggle.style.display = 'none';
    els.manualRow.classList.remove('visible');
    els.scannerView.classList.add('active');
    setTimeout(resizeToFit, 50);
  }

  function hideScanner() {
    els.scannerView.classList.remove('active');
    els.collapsed.style.display = 'flex';
    els.manualToggle.style.display = 'block';
    setTimeout(resizeToFit, 50);
  }

  // ---------- Scanner core ----------
  function startScanner() {
    if (typeof ZXing === 'undefined' || !ZXing.BrowserMultiFormatReader) {
      setStatus('Scanner failed to load. Use manual entry.', 'error');
      return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus('Camera not supported. Use manual entry.', 'error');
      return;
    }

    showScanner();
    setStatus('Starting camera…');

    var hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.DATA_MATRIX,
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.PDF_417
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

    state.codeReader = new ZXing.BrowserMultiFormatReader(hints, 300);
    state.scanning = true;

    var constraints = {
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    };

    state.codeReader.decodeFromConstraints(constraints, els.video, function (result) {
      if (!state.scanning || !result) return;
      var text = result.getText();
      var match = text.match(VIN_EXTRACT);
      var captured = match ? match[0].toUpperCase() : text.toUpperCase();
      setValue(captured, true);
      if (VIN_REGEX.test(captured)) {
        setTimeout(stopScanner, 250);
      }
    }).then(function () {
      if (els.video.srcObject) {
        var tracks = els.video.srcObject.getVideoTracks();
        if (tracks && tracks[0]) {
          state.track = tracks[0];
          var caps = state.track.getCapabilities ? state.track.getCapabilities() : {};
          if (caps.torch) els.torchBtn.style.display = 'block';
        }
      }
      setStatus('Point camera at VIN barcode');
    }).catch(function (e) {
      console.error('Camera error:', e);
      var msg = 'Camera unavailable';
      if (e && e.name === 'NotAllowedError') msg = 'Camera permission denied';
      else if (e && e.name === 'NotFoundError') msg = 'No camera found. Use manual entry.';
      else if (e && e.message) msg = e.message;
      setStatus(msg, 'error');
      hideScanner();
    });
  }

  function stopScanner() {
    state.scanning = false;
    if (state.codeReader) {
      try { state.codeReader.reset(); } catch (e) {}
      state.codeReader = null;
    }
    state.track = null;
    state.torchOn = false;
    els.torchBtn.style.display = 'none';
    hideScanner();
  }

  function toggleTorch() {
    if (!state.track || !state.track.applyConstraints) return;
    state.torchOn = !state.torchOn;
    state.track.applyConstraints({ advanced: [{ torch: state.torchOn }] }).catch(function () {
      state.torchOn = false;
    });
  }

  // ---------- Wire up ----------
  els.scanBtn.addEventListener('click', startScanner);
  els.cancelBtn.addEventListener('click', stopScanner);
  els.torchBtn.addEventListener('click', toggleTorch);

  els.manualToggle.addEventListener('click', function () {
    var visible = els.manualRow.classList.toggle('visible');
    els.manualToggle.textContent = visible ? 'Hide manual entry' : 'Or enter VIN manually';
    if (visible) els.manualInput.focus();
    setTimeout(resizeToFit, 50);
  });

  els.manualSave.addEventListener('click', function () {
    setValue(els.manualInput.value, false);
  });

  els.manualInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      setValue(els.manualInput.value, false);
    }
  });

  window.addEventListener('pagehide', stopScanner);
  window.addEventListener('resize', resizeToFit);

  // ---------- Jotform integration ----------
  if (typeof JFCustomWidget !== 'undefined') {
    JFCustomWidget.subscribe('ready', function () {
      try {
        var existing = JFCustomWidget.getWidgetSetting('defaultValue');
        if (existing) setValue(existing, false);
      } catch (e) {}
      resizeToFit();
    });

    JFCustomWidget.subscribe('submit', function () {
      var val = state.value;
      JFCustomWidget.sendSubmit({
        valid: VIN_REGEX.test(val),
        value: val
      });
    });
  } else {
    // Standalone preview
    setTimeout(resizeToFit, 100);
  }
})();
</script>
</body>
</html>
